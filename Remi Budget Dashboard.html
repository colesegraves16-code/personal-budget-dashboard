<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        :root {
            --pale-green-header: #9FD9C3;
            --pale-green-light: #F0F6F3;
            --pale-green-dark: #4A6F63;
            --pale-green-accent: #6BA896;
            --text-dark: #1A1A1A;
            --text-muted: #666666;
            --border-color: #E0E8E5;
            --chart-success: #52A574;
            --chart-warning: #E8A857;
            --chart-danger: #D97971;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5fbf9 0%, #f0f6f3 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-dark);
        }

        .navbar {
            background: linear-gradient(135deg, var(--pale-green-header) 0%, var(--pale-green-accent) 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 8px 24px rgba(159, 217, 195, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .navbar h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .month-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .month-selector select {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }

        .month-selector select option {
            background: var(--pale-green-dark);
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out 0.1s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .metric-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 12px rgba(159, 217, 195, 0.08);
            transition: all 0.3s ease;
        }

        .metric-card:hover {
            box-shadow: 0 8px 24px rgba(159, 217, 195, 0.12);
            transform: translateY(-4px);
        }

        .metric-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--pale-green-dark);
            margin-bottom: 12px;
        }

        .metric-subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        .metric-card.highlight {
            background: var(--pale-green-light);
            border-color: var(--pale-green-header);
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        .chart-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 12px rgba(159, 217, 195, 0.08);
        }

        .chart-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--pale-green-dark);
            margin-bottom: 20px;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .table-section {
            background: white;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 12px rgba(159, 217, 195, 0.08);
            animation: fadeIn 0.8s ease-out 0.3s both;
        }

        .table-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--pale-green-dark);
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--pale-green-light);
            border-bottom: 2px solid var(--border-color);
        }

        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--pale-green-dark);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        tbody tr:hover {
            background: var(--pale-green-light);
        }

        .amount-positive {
            color: var(--chart-success);
            font-weight: 600;
        }

        .amount-negative {
            color: var(--chart-danger);
            font-weight: 600;
        }

        .add-transaction-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--pale-green-header) 0%, var(--pale-green-accent) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .add-transaction-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(159, 217, 195, 0.3);
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            .month-selector {
                justify-content: center;
            }

            .metrics-grid {
                grid-template-columns: 1fr;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .navbar h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Budget Dashboard</h1>
        <div class="month-selector">
            <label for="monthSelect" style="margin-right: 8px;">Select Month:</label>
            <select id="monthSelect">
                <option value="0">January</option>
                <option value="1">February</option>
                <option value="2">March</option>
                <option value="3">April</option>
                <option value="4">May</option>
                <option value="5">June</option>
                <option value="6">July</option>
                <option value="7">August</option>
                <option value="8">September</option>
                <option value="9">October</option>
                <option value="10">November</option>
                <option value="11">December</option>
            </select>
        </div>
    </div>

    <div class="container">
        <!-- Metrics -->
        <div class="metrics-grid">
            <div class="metric-card highlight">
                <div class="metric-label">Total Budget</div>
                <div class="metric-value" id="totalBudget">$0.00</div>
                <div class="metric-subtitle">For selected month</div>
            </div>

            <div class="metric-card highlight">
                <div class="metric-label">Total Spent</div>
                <div class="metric-value" id="totalSpent">$0.00</div>
                <div class="metric-subtitle">Expenses only</div>
            </div>

            <div class="metric-card">
                <div class="metric-label">Remaining</div>
                <div class="metric-value" id="remaining">$0.00</div>
                <div class="metric-subtitle">Budget left</div>
            </div>

            <div class="metric-card">
                <div class="metric-label">YTD Saved</div>
                <div class="metric-value" id="ytdSaved">$0.00</div>
                <div class="metric-subtitle">Jan - selected month</div>
            </div>
        </div>

        <!-- Charts -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">Spending by Category</div>
                <div class="chart-container">
                    <canvas id="spendingChart"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-title">Budget vs Actual</div>
                <div class="chart-container">
                    <canvas id="comparisonChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Transactions Table -->
        <div class="table-section">
            <div class="table-title">Recent Transactions</div>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Category</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Note</th>
                    </tr>
                </thead>
                <tbody id="transactionsBody">
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 30px; color: var(--text-muted);">
                            Loading transactions...
                        </td>
                    </tr>
                </tbody>
            </table>
            <a href="form.html" class="add-transaction-btn">+ Add Transaction</a>
        </div>
    </div>

    <script>
        // Chart color palette (matches Pale Green theme)
        const chartColors = {
            primary: '#9FD9C3',
            accent: '#6BA896',
            success: '#52A574',
            warning: '#E8A857',
            danger: '#D97971',
            light: '#F0F6F3'
        };

        let spendingChart, comparisonChart;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initializeCharts();
            loadData();
            
            document.getElementById('monthSelect').addEventListener('change', loadData);
        });

        function initializeCharts() {
            // Spending by Category Chart
            const spendingCtx = document.getElementById('spendingChart').getContext('2d');
            spendingChart = new Chart(spendingCtx, {
                type: 'doughnut',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        backgroundColor: [
                            chartColors.primary,
                            chartColors.accent,
                            chartColors.success,
                            chartColors.warning,
                            chartColors.danger,
                            '#A8C9BC'
                        ],
                        borderColor: 'white',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                font: { size: 12 },
                                color: '#1A1A1A',
                                usePointStyle: true,
                                padding: 12
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return '$' + context.parsed.toFixed(2);
                                }
                            }
                        }
                    }
                }
            });

            // Budget vs Actual Chart
            const comparisonCtx = document.getElementById('comparisonChart').getContext('2d');
            comparisonChart = new Chart(comparisonCtx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'Budget',
                            data: [],
                            backgroundColor: chartColors.primary,
                            borderRadius: 6,
                            borderSkipped: false
                        },
                        {
                            label: 'Actual',
                            data: [],
                            backgroundColor: chartColors.success,
                            borderRadius: 6,
                            borderSkipped: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    plugins: {
                        legend: {
                            labels: {
                                font: { size: 12 },
                                color: '#1A1A1A',
                                usePointStyle: true,
                                padding: 12
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': $' + context.parsed.x.toFixed(2);
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return '$' + value.toFixed(0);
                                }
                            }
                        }
                    }
                }
            });
        }

        function loadData() {
            // Replace with your Google Apps Script deployment URL
            const scriptUrl = 'https://script.google.com/macros/s/AKfycbyM2G0dY7OMYpLLwvt3GeYnLFPaHt0w4WAltSQiKgvvEj-ZXf3xK2lLezpkf6aIcS8pCg/exec';
            const selectedMonth = parseInt(document.getElementById('monthSelect').value) + 1;

            fetch(scriptUrl + '?month=' + selectedMonth)
                .then(response => response.json())
                .then(data => {
                    updateMetrics(data);
                    updateCharts(data);
                    updateTransactionsTable(data.transactions);
                })
                .catch(error => {
                    console.error('Error loading data:', error);
                    // Show sample data for demonstration
                    showSampleData();
                });
        }

        function updateMetrics(data) {
            document.getElementById('totalBudget').textContent = '$' + (data.totalBudget || 0).toFixed(2);
            document.getElementById('totalSpent').textContent = '$' + (data.totalSpent || 0).toFixed(2);
            
            const remaining = (data.totalBudget || 0) - (data.totalSpent || 0);
            document.getElementById('remaining').textContent = '$' + remaining.toFixed(2);
            
            document.getElementById('ytdSaved').textContent = '$' + (data.ytdSaved || 0).toFixed(2);
        }

        function updateCharts(data) {
            // Update Spending by Category
            spendingChart.data.labels = data.categoryLabels || [];
            spendingChart.data.datasets[0].data = data.categoryAmounts || [];
            spendingChart.update();

            // Update Budget vs Actual
            comparisonChart.data.labels = data.comparisonLabels || [];
            comparisonChart.data.datasets[0].data = data.budgetValues || [];
            comparisonChart.data.datasets[1].data = data.actualValues || [];
            comparisonChart.update();
        }

        function updateTransactionsTable(transactions) {
            const tbody = document.getElementById('transactionsBody');
            tbody.innerHTML = '';

            if (!transactions || transactions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 30px; color: #666;">No transactions for this month</td></tr>';
                return;
            }

            transactions.forEach(tx => {
                const row = `
                    <tr>
                        <td>${new Date(tx.date).toLocaleDateString()}</td>
                        <td>${tx.category}</td>
                        <td>${tx.type}</td>
                        <td class="${tx.type === 'Expense' ? 'amount-negative' : 'amount-positive'}">
                            ${tx.type === 'Expense' ? '-' : '+'}$${Math.abs(tx.actual).toFixed(2)}
                        </td>
                        <td>${tx.note || '-'}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function showSampleData() {
            const sampleData = {
                totalBudget: 1500.00,
                totalSpent: 1120.45,
                ytdSaved: 450.00,
                categoryLabels: ['Groceries', 'Food / Eating Out', 'Clothing', 'Transportation', 'Entertainment'],
                categoryAmounts: [280, 420, 150, 180, 90],
                comparisonLabels: ['Groceries', 'Food / Eating Out', 'Clothing', 'Transportation'],
                budgetValues: [300, 400, 200, 300],
                actualValues: [280, 420, 150, 180],
                transactions: [
                    { date: new Date().toISOString(), category: 'Groceries', type: 'Expense', actual: 45.99, note: 'Weekly groceries' },
                    { date: new Date(Date.now() - 86400000).toISOString(), category: 'Food / Eating Out', type: 'Expense', actual: 28.50, note: 'Lunch' },
                    { date: new Date(Date.now() - 172800000).toISOString(), category: 'Clothing', type: 'Expense', actual: 89.99, note: 'Pants' },
                ]
            };
            updateMetrics(sampleData);
            updateCharts(sampleData);
            updateTransactionsTable(sampleData.transactions);
        }
    </script>
</body>
</html>
